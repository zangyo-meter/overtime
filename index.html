<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残業メーター</title>
<style>
body{font-family:sans-serif;margin:20px;background:#fafafa}
.card{background:white;padding:16px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);max-width:480px;margin:auto}
input,select{width:100%;padding:10px;margin-top:8px;margin-bottom:14px;border-radius:8px;border:1px solid #ccc}
.result{font-size:1.2em;font-weight:bold;margin-top:10px}
.warn{color:#d00;font-weight:bold}
</style>
</head>
<body>

<details style="margin-bottom:15px;background:#f3f4f6;padding:10px;border-radius:8px;max-width:480px;margin:auto;">
  <summary style="font-weight:bold;cursor:pointer;">このツールの使い方</summary>
  <div style="margin-top:10px;line-height:1.7;">
    ・今日の残業時間を入力すると、今月の合計が自動計算されます<br>
    ・過労ライン（45h）までの残り時間が表示されます<br>
    ・ブラウザを閉じてもデータは保存されます<br>
    <small>※データはあなたの端末内だけに保存され、外部送信されません</small>
  </div>
</details>

<div class="card">
<h2>残業メーター</h2>

<label>今日の残業時間（時間）</label>
<input type="number" id="today" step="0.25">

<label>割増率</label>
<select id="rate">
  <option value="1">通常</option>
  <option value="1.25">25%</option>
  <option value="1.5">50%</option>
</select>

<div class="result">今月合計：<span id="total">0</span> h</div>
<div class="result">過労ラインまで：<span id="remain">45</span> h</div>
</div>

<script>
const todayInput=document.getElementById('today');
const totalEl=document.getElementById('total');
const remainEl=document.getElementById('remain');

let total=parseFloat(localStorage.getItem('overtime_total'))||0;
update();

todayInput.addEventListener('change',()=>{
  const val=parseFloat(todayInput.value)||0;
  total+=val;
  localStorage.setItem('overtime_total',total);
  todayInput.value='';
  update();
});

function update(){
  totalEl.textContent=total.toFixed(2);
  const remain=45-total;
  remainEl.textContent=remain.toFixed(2);
  remainEl.className=remain<0?'warn':'';
}
</script>

</body>
</html>

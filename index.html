<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="google-site-verification" content="r0fijA_W9nx3cpYDctgVaMVwVeBncIyoAV15Iwrhvtk" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>残業価値メーター</title>

<style>
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:16px
}
.container{max-width:720px;margin:auto}
h1{text-align:center}

.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin:12px 0;
  box-shadow:0 4px 10px rgba(0,0,0,.06)
}

label{display:block;margin-top:10px;font-size:14px}
input,select{
  width:100%;
  padding:10px;
  margin-top:4px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px
}

.result{font-size:20px;font-weight:bold;margin-top:6px}
.small{color:#666;font-size:13px;line-height:1.7}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hidden{display:none}

.notice{
  font-size:13px;
  color:#666;
  margin-top:10px
}

.feedback{
  text-align:center;
  margin-top:18px
}
.feedback a{
  display:inline-block;
  padding:12px 18px;
  background:#ff7a00;
  color:white;
  font-weight:bold;
  border-radius:8px;
  text-decoration:none;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.about-link{
  margin-top:12px;
}
.about-link a{
  color:#0066cc;
  font-weight:bold;
  text-decoration:none;
}
.about-link a:hover{
  text-decoration:underline;
}

@media(max-width:500px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">
<h1>残業価値メーター</h1>

<div class="card">
<h2>このツールについて</h2>
<div class="small">
月給・労働時間を入力すると、残業1時間の価値や手当額を自動計算します。<br>
数日分まとめて入力してもOKです。
</div>

<div class="about-link">
<a href="https://note.com/tool_lab_dev/n/n7e620c4ab2b3" target="_blank">
📝 このツールを作った理由・使い方を note で読む
</a><br>
<a href="https://note.com/tool_lab_dev/n/n5b4da2c8dda1" target="_blank">
💡 残業1時間っていくら？考え方を note で読む
</a>
</div>

<div class="notice">
※データはあなたの端末内だけで計算され、外部送信は行われません
</div>
</div>

<div class="card">
<h2>基本情報</h2>
<label>月給（円）<input id="salary" type="number"></label>
<label>1日の労働時間<input id="hoursPerDay" type="number" step="0.1"></label>
<label>月の労働日数<input id="days" type="number"></label>
</div>

<div class="card">
<h2>割増率設定</h2>
<label>プリセット
<select id="preset">
<option value="legal">法定どおり</option>
<option value="better">優遇企業（残業30%）</option>
<option value="gov">公務員想定</option>
<option value="custom">カスタム</option>
</select>
</label>

<div id="customBox" class="hidden">
<label>残業倍率<input id="otRate" type="number" step="0.01" value="1.25"></label>
<label>深夜倍率<input id="nightRate" type="number" step="0.01" value="1.50"></label>
<label>休日倍率<input id="holidayRate" type="number" step="0.01" value="1.35"></label>
</div>
</div>

<div class="card">
<h2>労働時間</h2>
<label>残業時間<input id="overtime" type="number" step="0.1"></label>
<label>深夜時間（22-5時）<input id="night" type="number" step="0.1"></label>
<label>休日労働時間<input id="holiday" type="number" step="0.1"></label>
</div>

<div class="card">
<h2>結果</h2>
<div class="grid">
<div><div class="small">通常時給</div><div class="result" id="hourly">-</div></div>
<div><div class="small">残業1時間の価値</div><div class="result" id="valueHour">-</div></div>
<div><div class="small">残業代</div><div class="result" id="overtimePay">-</div></div>
<div><div class="small">深夜手当</div><div class="result" id="nightPay">-</div></div>
<div><div class="small">休日手当</div><div class="result" id="holidayPay">-</div></div>
<div><div class="small">追加収入合計</div><div class="result" id="total">-</div></div>
</div>

<div class="feedback">
<a href="https://forms.gle/vuLwvdTqvhHNf7v96" target="_blank">
💬 ご意見・不具合報告はこちら
</a>
</div>

</div>
</div>

<script>
const salaryEl=()=>document.getElementById('salary');
const hoursPerDay=document.getElementById('hoursPerDay');
const days=document.getElementById('days');
const overtime=document.getElementById('overtime');
const night=document.getElementById('night');
const holiday=document.getElementById('holiday');
const preset=document.getElementById('preset');
const customBox=document.getElementById('customBox');
const otRate=document.getElementById('otRate');
const nightRate=document.getElementById('nightRate');
const holidayRate=document.getElementById('holidayRate');
const hourlyEl=()=>document.getElementById('hourly');
const overtimePayEl=()=>document.getElementById('overtimePay');
const nightPayEl=()=>document.getElementById('nightPay');
const holidayPayEl=()=>document.getElementById('holidayPay');
const totalEl=()=>document.getElementById('total');
const valueHour=document.getElementById('valueHour');

const inputs=["salary","hoursPerDay","days","overtime","night","holiday","otRate","nightRate","holidayRate"];
inputs.forEach(id=>{
 const el=document.getElementById(id);
 if(el) el.addEventListener("input",calc)
});

preset.addEventListener("change",applyPreset);

function yen(v){return v.toLocaleString()+"円"}

function applyPreset(){
 const p=preset.value;
 customBox.style.display = (p==='custom') ? 'block' : 'none';
 if(p==="legal") setRates(1.25,1.5,1.35);
 if(p==="better") setRates(1.3,1.5,1.35);
 if(p==="gov") setRates(1.25,1.5,1.35);
 calc();
}

function setRates(a,b,c){
 otRate.value=a;
 nightRate.value=b;
 holidayRate.value=c;
}

function calc(){
let salary=+salaryEl().value||0;
let hpd=+hoursPerDay.value||0;
let daysVal=+days.value||0;
let overtimeH=+overtime.value||0;
let nightH=+night.value||0;
let holidayH=+holiday.value||0;
let ot=+otRate.value||1.25;
let nr=+nightRate.value||1.5;
let hr=+holidayRate.value||1.35;

let baseHours=hpd*daysVal;
if(baseHours<=0){reset();return}

let hourly=salary/baseHours;
let overtimePay=hourly*ot*overtimeH;
let nightPay=hourly*nr*nightH;
let holidayPay=hourly*hr*holidayH;
let total=overtimePay+nightPay+holidayPay;

hourlyEl().textContent=yen(Math.round(hourly));
valueHour.textContent=yen(Math.round(hourly*ot));
overtimePayEl().textContent=yen(Math.round(overtimePay));
nightPayEl().textContent=yen(Math.round(nightPay));
holidayPayEl().textContent=yen(Math.round(holidayPay));
totalEl().textContent=yen(Math.round(total));
}

function reset(){
[hourlyEl(),valueHour,overtimePayEl(),nightPayEl(),holidayPayEl(),totalEl()]
.forEach(e=>e.textContent='-')
}

applyPreset();
</script>
</body>
</html>
